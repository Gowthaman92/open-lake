apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: {{ include "openlake.postgres.clusterName" . }}
  labels:
    {{- include "openlake.labels" . | nindent 4 }}
spec:
  teamId: {{ .Values.postgres.postgresql.teamId | quote }}
  volume:
    size: {{ .Values.postgres.postgresql.volume.size }}
  numberOfInstances: {{ .Values.postgres.postgresql.numberOfInstances }}
  users:
    {{- range $user, $roles := .Values.postgres.postgresql.users }}
    {{ $user }}: {{ $roles | toJson }}
    {{- end }}
  databases:
    {{- range $dbName, $owner := .Values.postgres.postgresql.databases }}
    {{ $dbName }}: {{ $owner }}
    {{- end }}
  postgresql:
    version: {{ .Values.postgres.postgresql.version | quote }} 